spring.application.name=loanmanagementservice

server.port=8008

jwt.secret=2L7OaWJq8w3sM7vM8q5Gq0Wz6JfYzI6aQyd0NgqfFs8=
jwt.expiration=86400000

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3311/loanmanagementservice?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:loanmanagementservice}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:loanmanagementservice}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Customer Service (WebClient - lấy CustomerProfile)
customer-service.url=${CUSTOMER_SERVICE_URL:http://localhost:8006}

# Prediction Service (WebClient - dùng khi sync/poll; request predict qua MQ)
prediction-service.url=${PREDICTION_SERVICE_URL:http://localhost:8007}

# RabbitMQ - request/result prediction qua message queue
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Model predict (LoanManagementService gửi trực tiếp tới ml-model; nhận kết quả từ ml-model)
rabbitmq.exchange.model-predict=${RABBITMQ_EXCHANGE_MODEL_PREDICT:model.predict.exchange}
rabbitmq.routing-key.model-predict-requested=${RABBITMQ_ROUTING_KEY_MODEL_PREDICT_REQUESTED:model.predict.requested}

# Loan prediction (LoanManagementService gửi request tới predictionservice; nhận kết quả từ predictionservice)
rabbitmq.exchange.loan-prediction=${RABBITMQ_EXCHANGE_LOAN_PREDICTION:loan.prediction.exchange}
rabbitmq.routing-key.loan-prediction-requested=${RABBITMQ_ROUTING_KEY_LOAN_PREDICTION_REQUESTED:loan.prediction.requested}
rabbitmq.routing-key.loan-prediction-completed=${RABBITMQ_ROUTING_KEY_LOAN_PREDICTION_COMPLETED:loan.prediction.completed}
rabbitmq.queue.loan-prediction-completed=${RABBITMQ_QUEUE_LOAN_PREDICTION_COMPLETED:loan.prediction.completed}
