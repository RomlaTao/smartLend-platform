# ===========================================
# API Gateway Configuration
# ===========================================

# Server port
server.port=8080

# Application name
spring.application.name=apigateway

# ===========================================
# Eureka Client Configuration
# ===========================================

# Register with Eureka Server
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Instance configuration
eureka.instance.hostname=${EUREKA_SERVER_HOST:localhost:8761}
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=30
eureka.instance.lease-expiration-duration-in-seconds=90

# ===========================================
# Gateway Configuration
# ===========================================

# Gateway discovery locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===========================================
# Load Balancer Configuration
# ===========================================

# Load balancer configuration
spring.cloud.loadbalancer.ribbon.enabled=false

# ===========================================
# CORS Configuration
# ===========================================

# CORS settings
spring.webflux.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.webflux.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.webflux.cors.allowed-headers=*
spring.webflux.cors.allow-credentials=true

# ===========================================
# Logging Configuration
# ===========================================

# Log level cho Gateway
logging.level.com.predict_app.apigateway=INFO
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.web.reactive=DEBUG

# ===========================================
# Management & Monitoring
# ===========================================

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,gateway
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Gateway actuator
management.endpoint.gateway.enabled=true

# Health check configuration
management.health.redis.enabled=true
management.health.db.enabled=true

# ===========================================
# JWT Configuration
# ===========================================

# JWT secret key
jwt.secret=${JWT_SECRET:2L7OaWJq8w3sM7vM8q5Gq0Wz6JfYzI6aQyd0NgqfFs8=}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===========================================
# Circuit Breaker
# ===========================================

# Circuit breaker configuration
# spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=myCircuitBreaker

# ===========================================
# Redis Configuration
# ===========================================

# Redis connection (override via env REDIS_HOST/REDIS_PORT)
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ===========================================
# Gateway Routes & Rate Limiting
# ===========================================

# Identity Service
spring.cloud.gateway.routes[0].id=identity-service-auth
spring.cloud.gateway.routes[0].uri=lb://identityservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**,/api/users-profiles/**
spring.cloud.gateway.routes[0].filters[0]=AddRequestHeader=X-Gateway-Source,api-gateway
spring.cloud.gateway.routes[0].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[0].filters[1].args.redis-rate-limiter.requestedTokens=5
spring.cloud.gateway.routes[0].filters[1].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[0].filters[2].name=JwtAuthenticationFilter

# Customer Service
spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://customerservice
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/customers/**
spring.cloud.gateway.routes[1].filters[0]=AddRequestHeader=X-Gateway-Source,api-gateway
spring.cloud.gateway.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.routes[1].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[1].filters[1].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[1].filters[2].name=JwtAuthenticationFilter

# Prediction Service
spring.cloud.gateway.routes[2].id=prediction-service
spring.cloud.gateway.routes[2].uri=lb://predictionservice
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/predictions/**
spring.cloud.gateway.routes[2].filters[0]=AddRequestHeader=X-Gateway-Source,api-gateway
spring.cloud.gateway.routes[2].filters[1].name=RequestRateLimiter
spring.cloud.gateway.routes[2].filters[1].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.routes[2].filters[1].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.routes[2].filters[1].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.routes[2].filters[1].args.key-resolver=#{@ipKeyResolver}
spring.cloud.gateway.routes[2].filters[2].name=JwtAuthenticationFilter

