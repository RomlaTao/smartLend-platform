# ===========================================
# Infrastructure Services
# ===========================================

services:
  # MySQL Database for IdentityService
  mysql-identity:
    image: mysql:8.0
    container_name: mysql-identity
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: identityservice
      MYSQL_USER: ${IDENTITY_DB_USERNAME}
      MYSQL_PASSWORD: ${IDENTITY_DB_PASSWORD}
    volumes:
      - mysql_identity_data:/var/lib/mysql
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MySQL Database for CustomerService
  mysql-customer:
    image: mysql:8.0
    container_name: mysql-customer
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: customerservice
      MYSQL_USER: ${CUSTOMER_DB_USERNAME}
      MYSQL_PASSWORD: ${CUSTOMER_DB_PASSWORD}
    volumes:
      - mysql_customer_data:/var/lib/mysql
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MySQL Database for PredictionService
  mysql-prediction:
    image: mysql:8.0
    container_name: mysql-prediction
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: predictionservice
      MYSQL_USER: ${PREDICTION_DB_USERNAME}
      MYSQL_PASSWORD: ${PREDICTION_DB_PASSWORD}
    volumes:
      - mysql_prediction_data:/var/lib/mysql
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # # MySQL Database for AnalyticsService
  # mysql-analystic:
  #   image: mysql:8.0
  #   container_name: mysql-analystic
  #   ports:
  #     - "3311:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
  #     MYSQL_DATABASE: analysticservice
  #     MYSQL_USER: ${ANALYSTIC_DB_USERNAME}
  #     MYSQL_PASSWORD: ${ANALYSTIC_DB_PASSWORD}
  #   volumes:
  #     - mysql_analystic_data:/var/lib/mysql
  #   networks:
  #     - smart-lend-platform-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VIRTUAL_HOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # Application Services
  # ===========================================

  # Eureka Server (Service Discovery)
  eureka-server:
    build:
      context: .
      dockerfile: ./eurekaserver/Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - smart-lend-platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "${EUREKA_SERVER_URL}/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 10s
      start_period: 30s

  # API Gateway (Routing, Load Balancing, Rate Limiting)
  apigateway:
    build:
      context: .
      dockerfile: ./apigateway/Dockerfile
    container_name: apigateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f ${EUREKA_SERVER_URL}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # IdentityService (Authentication & Authorization & User Profile Management)
  identityservice:
    build:
      context: .
      dockerfile: ./identityservice/Dockerfile
    container_name: identityservice
    ports:
      - "8005:8005"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${IDENTITY_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${IDENTITY_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${IDENTITY_DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      ADMIN_DEFAULT_ROLE: ${ADMIN_DEFAULT_ROLE}

      # SPRING_RABBITMQ_HOST: rabbitmq
      # SPRING_RABBITMQ_PORT: 5672
      # SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      # SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      mysql-identity:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f ${EUREKA_SERVER_URL}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # CustomerService (Customer Profile Management)
  customerservice:
    build:
      context: .
      dockerfile: ./customerservice/Dockerfile
    container_name: customerservice
    ports:
      - "8006:8006"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${CUSTOMER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${CUSTOMER_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${CUSTOMER_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      # RabbitMQ Queue Configuration for CustomerService

    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      mysql-customer:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f ${EUREKA_SERVER_URL}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # PredictionService (ML Prediction Management)
  predictionservice:
    build:
      context: .
      dockerfile: ./predictionservice/Dockerfile
    container_name: predictionservice
    ports:
      - "8008:8008"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: ${PREDICTION_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${PREDICTION_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${PREDICTION_DB_PASSWORD}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      
      # RabbitMQ Queue Configuration for PredictionService
      RABBITMQ_EXCHANGE_MODEL_PREDICT: model.predict.exchange
      RABBITMQ_QUEUE_MODEL_PREDICT_REQUESTED: model.predict.requested
      RABBITMQ_ROUTING_KEY_MODEL_PREDICT_REQUESTED: model.predict.requested
      RABBITMQ_QUEUE_MODEL_PREDICT_COMPLETED: model.predict.completed
      RABBITMQ_ROUTING_KEY_MODEL_PREDICT_COMPLETED: model.predict.completed
      
      # CurrencyService Configuration
      CURRENCY_SERVICE_URL: ${CURRENCY_SERVICE_URL}
      CUSTOMER_SERVICE_URL: ${CUSTOMER_SERVICE_URL}
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      mysql-prediction:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f ${EUREKA_SERVER_URL}/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ML Model Service (Python Flask Service)
  ml-model-service:
    build:
      context: ./ml-model
      dockerfile: Dockerfile
    container_name: ml-model-service
    ports:
      - "5000:5000"
    environment:
      # RabbitMQ Configuration
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VIRTUAL_HOST}
      # RabbitMQ Queue Configuration (align with predictionservice)
      MODEL_PREDICT_REQUESTED_EXCHANGE: model.predict.exchange
      MODEL_PREDICT_REQUESTED_QUEUE: model.predict.requested
      MODEL_PREDICT_REQUESTED_ROUTING_KEY: model.predict.requested
      MODEL_PREDICT_COMPLETED_EXCHANGE: model.predict.exchange
      MODEL_PREDICT_COMPLETED_QUEUE: model.predict.completed
      MODEL_PREDICT_COMPLETED_ROUTING_KEY: model.predict.completed
      # Model Configuration
      MODEL_PATH: model/final_lgbm_model.joblib
      OHE_ENCODER_PATH: model/ohe_encoder.joblib
      SCALER_PATH: model/scaler_normal.joblib
      MERGE_OHE_COLUMNS_PATH: model/merge_ohe_col.joblib
      TRAINING_COLUMNS_PATH: model/training_columns.joblib
      # Application Configuration
      HOST: 0.0.0.0
      PORT: 5000
      DEBUG: "false"
      # Model Metadata
      MODEL_VERSION: ${MODEL_VERSION}
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import requests; requests.get('http://localhost:5000/health').raise_for_status()\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # CurrencyService (Currency Exchange Rate Management)
  currencyservice:
    build:
      context: .
      dockerfile: ./currencyservice/Dockerfile
    container_name: currencyservice
    ports:
      - "8011:8011"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CURRENCY_API_URL: ${CURRENCY_API_URL}
      CURRENCY_FALLBACK_RATE: ${CURRENCY_FALLBACK_RATE}
      CURRENCY_UPDATE_INTERVAL: ${CURRENCY_UPDATE_INTERVAL}
    networks:
      - smart-lend-platform-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8011/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # # AnalysticService (Analytics Management)
  # analysticservice:
  #   build:
  #     context: ./analysticservice
  #     dockerfile: Dockerfile
  #   container_name: analysticservice
  #   ports:
  #     - "8010:8010"
  #   environment:
  #     SPRING_PROFILES_ACTIVE: docker
  #     SPRING_DATASOURCE_URL: ${ANALYSTIC_DB_URL}
  #     SPRING_DATASOURCE_USERNAME: ${ANALYSTIC_DB_USERNAME}
  #     SPRING_DATASOURCE_PASSWORD: ${ANALYSTIC_DB_PASSWORD}
  #     EUREKA_SERVER_URL: ${EUREKA_SERVER_URL}
  #     SPRING_RABBITMQ_HOST: rabbitmq
  #     SPRING_RABBITMQ_PORT: 5672
  #     SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
  #     SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

  #     RABBITMQ_EXCHANGE_PREDICTION_COMPLETED: prediction.exchange
  #     RABBITMQ_QUEUE_PREDICTION_COMPLETED_ANALYTICS: prediction.completed-analytics
  #     RABBITMQ_ROUTING_KEY_PREDICTION_COMPLETED_ANALYTICS: prediction.completed-analytics
  #   networks:
  #     - smart-lend-platform-network
  #   restart: unless-stopped
  #   depends_on:
  #     mysql-analystic:
  #       condition: service_healthy
  #     rabbitmq:
  #       condition: service_healthy
  #     eureka-server:
  #       condition: service_started
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f ${EUREKA_SERVER_URL}/actuator/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 60s

volumes:
  # Database volumes
  mysql_identity_data:
  mysql_customer_data:
  mysql_prediction_data:
  # mysql_analystic_data:
  
  # Message broker volume
  rabbitmq_data:
  
  # Cache volume
  redis_data:

networks:
  smart-lend-platform-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
