spring.application.name=predictionservice

server.port=8007

jwt.secret=2L7OaWJq8w3sM7vM8q5Gq0Wz6JfYzI6aQyd0NgqfFs8=
jwt.expiration=86400000

spring.datasource.url = ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3310/predictionservice?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME:predictionservice}
spring.datasource.password = ${SPRING_DATASOURCE_PASSWORD:predictionservice}
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto = ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql = ${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect = ${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

eureka.client.service-url.defaultZone = ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address = true

# RabbitMQ Configuration
spring.rabbitmq.host = ${RABBITMQ_HOST:localhost}
spring.rabbitmq.port = ${RABBITMQ_PORT:5672}
spring.rabbitmq.username = ${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password = ${RABBITMQ_PASSWORD:guest}

# RabbitMQ Queue Configuration
rabbitmq.exchange.model-predict = ${RABBITMQ_EXCHANGE_MODEL_PREDICT:model.predict.exchange}
rabbitmq.queue.model-predict-requested = ${RABBITMQ_QUEUE_MODEL_PREDICT_REQUESTED:model.predict.requested}
rabbitmq.routing-key.model-predict-requested = ${RABBITMQ_ROUTING_KEY_MODEL_PREDICT_REQUESTED:model.predict.requested}
rabbitmq.queue.model-predict-completed = ${RABBITMQ_QUEUE_MODEL_PREDICT_COMPLETED:model.predict.completed}
rabbitmq.routing-key.model-predict-completed = ${RABBITMQ_ROUTING_KEY_MODEL_PREDICT_COMPLETED:model.predict.completed}

# Loan Prediction (loan management gửi request, predictionservice gửi result)
rabbitmq.exchange.loan-prediction = ${RABBITMQ_EXCHANGE_LOAN_PREDICTION:loan.prediction.exchange}
rabbitmq.queue.loan-prediction-requested = ${RABBITMQ_QUEUE_LOAN_PREDICTION_REQUESTED:loan.prediction.requested}
rabbitmq.routing-key.loan-prediction-requested = ${RABBITMQ_ROUTING_KEY_LOAN_PREDICTION_REQUESTED:loan.prediction.requested}
rabbitmq.routing-key.loan-prediction-completed = ${RABBITMQ_ROUTING_KEY_LOAN_PREDICTION_COMPLETED:loan.prediction.completed}

# CurrencyService Configuration
currency.service.url = ${CURRENCY_SERVICE_URL:http://localhost:8011}
# CustomerService Configuration
customerservice.service.url = ${CUSTOMER_SERVICE_URL:http://localhost:8006}
# ===========================================
# Management & Monitoring
# ===========================================   
# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# Health check configuration
management.health.db.enabled=true
management.health.redis.enabled=false
